<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480" role="img" aria-label="Siarhei Sheleh portrait placeholder">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1524"/>
      <stop offset="100%" stop-color="#070a12"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0f1c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="55%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#a3e635"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="480" height="480" fill="url(#bg)"/>
  <rect width="480" height="480" fill="url(#grid)"/>
  <rect width="480" height="480" fill="url(#glow)"/>

  <!-- silhouette: shoulders + head -->
  <g transform="translate(240,260)">
    <ellipse cx="0" cy="125" rx="160" ry="80" fill="#131a2c" opacity="0.95"/>
    <circle cx="0" cy="-20" r="78" fill="#131a2c"/>
    <circle cx="0" cy="-20" r="78" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </g>

  <!-- frame ring -->
  <rect x="14" y="14" width="452" height="452" rx="22" ry="22" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.65"/>

  <!-- mono label -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" fill="#9aa3b2" font-size="13" letter-spacing="2.4">
    <text x="32" y="52">// SV LAB</text>
    <text x="32" y="448" fill="#5b6577">// PORTRAIT · PLACEHOLDER</text>
    <text x="448" y="448" text-anchor="end" fill="#5b6577">DROP IN /about/portrait.jpg</text>
  </g>

  <!-- name -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" fill="#e7ecf3">
    <text x="240" y="395" text-anchor="middle" font-size="22" font-weight="600" letter-spacing="-0.3">Siarhei Sheleh</text>
    <text x="240" y="418" text-anchor="middle" font-size="13" fill="#9aa3b2">Sergey Sheleg · Warsaw, PL</text>
  </g>
</svg>
